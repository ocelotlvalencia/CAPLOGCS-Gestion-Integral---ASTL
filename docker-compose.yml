version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: caplogcs_postgres
    restart: always
    environment:
      POSTGRES_DB: db_caplogcs
      POSTGRES_USER: caplogcs_user
      POSTGRES_PASSWORD: caplogcs_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: