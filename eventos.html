<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./styles.css" />
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Eventos | CAPLOGCS</title>
  </head>
  <body>
    <header class="header-actividades">
      <img src="./images/Logo_CapSF.png" alt="Logo" class="header-logo" />
      <span class="header-actividades-title">Eventos</span>
      <span class="header-login-icon" title="Iniciar sesión">🔑</span>
    </header>
    <main class="eventos-main">
      <h2>Bienvenido a la sección de Eventos</h2>
      <button class="volver-btn" id="volver-dashboard">← Volver</button>
      <!-- Aquí puedes agregar el contenido específico de eventos -->
    </main>
    <footer class="footer-caplogs">
      <span>© 2026 CAPLOGCS. Todos los derechos reservados.</span>
    </footer>
    <div id="login-modal" class="modal-login hidden">
      <div class="modal-content login-modal-content">
        <span class="close-modal" id="close-login-modal">&times;</span>
        <h2 class="login-title">Accede a tu cuenta</h2>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
        <form id="login-form">
          <label for="nombre" class="login-label">Usuario</label>
          <input type="text" id="nombre" name="nombre" required autocomplete="off" placeholder="Nombre Apellido" class="login-input" />
          <label for="password" class="login-label">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" required placeholder="-------------------" class="login-input" />
            <span class="toggle-password" id="toggle-password" title="Mostrar/Ocultar contraseña">👁️</span>
          </div>
          <button type="submit" class="login-btn">Acceder</button>
        </form>
      </div>
    </div>
  </body>
  <script src="./renderer.js"></script>
</html>
